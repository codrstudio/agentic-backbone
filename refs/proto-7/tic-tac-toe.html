<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 5px; justify-content: center; margin: 20px auto; }
        .cell { width: 100px; height: 100px; background: white; border: 2px solid #333; font-size: 2em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .cell:hover { background: #e0e0e0; }
        .status { font-size: 1.5em; margin: 20px; }
        button { padding: 10px 20px; font-size: 1em; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Jogo da Velha</h1>
    <div class="status" id="status">Vez do X</div>
    <div class="board" id="board"></div>
    <button onclick="resetGame()">Novo Jogo</button>

    <script>
        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameOver = false;

        const winningConditions = [
            [0,1,2], [3,4,5], [6,7,8], // linhas
            [0,3,6], [1,4,7], [2,5,8], // colunas
            [0,4,8], [2,4,6] // diagonais
        ];

        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', handleClick);
                boardEl.appendChild(cell);
            }
        }

        function handleClick(e) {
            const index = e.target.dataset.index;
            if (board[index] || gameOver) return;

            board[index] = currentPlayer;
            e.target.textContent = currentPlayer;
            e.target.style.cursor = 'default';

            if (checkWin()) {
                document.getElementById('status').textContent = `Jogador ${currentPlayer} venceu!`;
                gameOver = true;
                return;
            }

            if (board.every(cell => cell)) {
                document.getElementById('status').textContent = 'Empate!';
                gameOver = true;
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            document.getElementById('status').textContent = `Vez do ${currentPlayer}`;
        }

        function checkWin() {
            return winningConditions.some(condition => {
                const [a, b, c] = condition;
                return board[a] &amp;&amp; board[a] === board[b] &amp;&amp; board[a] === board[c];
            });
        }

        function resetGame() {
            board = Array(9).fill(null);
            currentPlayer = 'X';
            gameOver = false;
            document.getElementById('status').textContent = 'Vez do X';
            initBoard();
        }

        initBoard();
    </script>
</body>
</html>
